<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bé Trưởng Thành - Survival Game</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #2c3e50; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        .ui-panel {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8);
            color: white; padding: 15px; border-radius: 12px; border: 2px solid #4ecdc4;
            min-width: 180px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .stat { font-size: 16px; margin: 5px 0; display: flex; align-items: center; gap: 8px; }
        .instruction {
            position: absolute; bottom: 15px; width: 100%; text-align: center;
            color: #ecf0f1; font-size: 14px; text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div class="stat">❤️ Sức khỏe: <span id="hp">100</span>%</div>
        <div class="stat">⚖️ Cân nặng: <span id="weight">20</span>kg</div>
        <div class="stat">🧠 Trí tuệ: <span id="intel">0</span></div>
        <div class="stat">💰 Tiền: <span id="money">50</span>đ</div>
        <div style="margin-top:10px; color:#4ecdc4; font-size:12px;">🌟 Nhiệm vụ: Ăn đồ tốt</div>
    </div>

    <div class="instruction">Di chuyển bằng phím mũi tên | Xanh: Tốt - Đỏ: Xấu - Vàng: Học tập</div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: '#34495e',
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { create: create, update: update }
    };

    let player, cursors, foods, dangers, schools;
    let stats = { hp: 100, weight: 20, intel: 0, money: 50 };
    const game = new Phaser.Game(config);

    function create() {
        // 1. Tạo nhân vật (Khối vuông màu hồng xinh xắn)
        player = this.add.rectangle(window.innerWidth/2, window.innerHeight/2, 40, 40, 0xff6b6b);
        this.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);

        // 2. Tạo nhóm đồ ăn TỐT (Màu XANH LÁ)
        foods = this.physics.add.group();
        for(let i=0; i<4; i++) createItem(foods, 0x2ecc71, this);

        // 3. Tạo nhóm đồ ăn XẤU (Màu ĐỎ)
        dangers = this.physics.add.group();
        for(let i=0; i<3; i++) createItem(dangers, 0xe74c3c, this);

        // 4. Tạo khu vực HỌC TẬP (Màu VÀNG)
        schools = this.physics.add.group();
        for(let i=0; i<2; i++) createItem(schools, 0xf1c40f, this);

        // Xử lý va chạm
        this.physics.add.overlap(player, foods, (p, f) => {
            f.destroy(); stats.hp = Math.min(100, stats.hp+5); stats.weight += 0.1;
            updateUI(); createItem(foods, 0x2ecc71, this);
        });

        this.physics.add.overlap(player, dangers, (p, d) => {
            d.destroy(); stats.hp -= 15; stats.weight += 0.5;
            this.cameras.main.shake(100, 0.01);
            updateUI(); createItem(dangers, 0xe74c3c, this);
        });

        this.physics.add.overlap(player, schools, (p, s) => {
            s.destroy(); stats.intel += 10; stats.hp -= 2;
            updateUI(); createItem(schools, 0xf1c40f, this);
        });

        cursors = this.input.keyboard.createCursorKeys();
    }

    function createItem(group, color, scene) {
        let x = Phaser.Math.Between(50, window.innerWidth - 50);
        let y = Phaser.Math.Between(50, window.innerHeight - 50);
        let item = scene.add.circle(x, y, 15, color);
        group.add(item);
    }

    function update() {
        player.body.setVelocity(0);
        if (cursors.left.isDown) player.body.setVelocityX(-250);
        else if (cursors.right.isDown) player.body.setVelocityX(250);
        if (cursors.up.isDown) player.body.setVelocityY(-250);
        else if (cursors.down.isDown) player.body.setVelocityY(250);

        if (stats.hp <= 0) { alert("Bé kiệt sức rồi! Hãy ăn uống lành mạnh hơn."); location.reload(); }
    }

    function updateUI() {
        document.getElementById('hp').innerText = stats.hp;
        document.getElementById('weight').innerText = stats.weight.toFixed(1);
        document.getElementById('intel').innerText = stats.intel;
        document.getElementById('money').innerText = stats.money;
    }
</script>
</body>
</html>
