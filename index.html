<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Trưởng Thành - Bản Đồ Họa</title>
    <script src="phaser.min.js"></script>
    <style>
        body { margin: 0; background: #27ae60; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; border: 2px solid #f1c40f; z-index: 10; pointer-events: none; }
        .stat { font-size: 16px; margin: 3px 0; font-weight: bold; }
        #quiz-box { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; z-index: 100; border: 6px solid #f1c40f; }
        .ans-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">❤️ Máu: <span id="hp">100</span>%</div>
        <div class="stat">⚖️ Cân nặng: <span id="weight">20</span>kg</div>
        <div class="stat">🧠 Trí tuệ: <span id="intel">0</span></div>
    </div>

    <div id="quiz-box">
        <h3 id="q-text" style="color: #2c3e50; margin-bottom: 20px;">Câu hỏi?</h3>
        <button id="btnA" class="ans-btn" style="background: #3498db;" onclick="handleAns('A')"></button>
        <button id="btnB" class="ans-btn" style="background: #e67e22;" onclick="handleAns('B')"></button>
    </div>

<script>
    // Hình ảnh được mã hóa trực tiếp vào code (Base64)
    const assets = {
        player: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAwCAYAAABq5yUFAAAABGdBTUEAALGPC/xhBQAAACBjSFJNAAB6JgAAgIQAAPoAAACA6AAAdTAAAOpgAAA6mAAAF3CculE8AAAACXBIWXMAAAsTAAALEwEAmpwYAAABm0lEQVRYR+2Y0U3DMBRF76RsgE7ACIDRERghY4SMAYyQMQKMgBE6AiNwBEboCBwBE7Sfv6S9S9InS9smTfSIn3SOfX3vXidpGscYf67r9Y6u8C9fX7U/i7Z79YAnvIDv/Yf5I/YfV5G0O7F7HPAE3mG3n8R6FnuLpL2I3Y+AL/ADe4B0m9SfxN4iaS9iDyPge6vVvY9YrxS/S8XpIr6L6C7i+0R1K6p7K/67iK4VX0V0XfFdRPcV30V0X6t7H7HeKn6XitNFfBfRXcT3f6u7E9W9Vf8V30V0XfFdRPcV30V0X6v7ILeH3W6V+pPYWyTtRex+BPyAv0F6gHSb1J/E3iJpL2IPL3D6B5z+A95AOkD6D6S9iN2PABXfX0X3S8XpIr6L6C7i+6/VvY/YrxS/S8XpIr6L6C7i+0R1K6p7K/67iK4VX0V0XfFdRPcV30V0X6v7ILeH3W6V+pPYWyTtRex+BPyAv0F6gHSb1J/E3iJpL2IPL3D6B5z+A95AOkD6D6S9iN2PABXfX0X3S8XpIr6L6C7i+6/VvY/YrxS/S8XpIr6L6C7i+0R1K6p7K/67iK4VX0V0XfFdRPcV30V0X6v7XwT8Ak7h9P8W7eB+AAAAAElFTkSuQmCC',
        apple: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAABGdBTUEAALGPC/xhBQAAACBjSFJNAAB6JgAAgIQAAPoAAACA6AAAdTAAAOpgAAA6mAAAF3CculE8AAAACXBIWXMAAAsTAAALEwEAmpwYAAABMElEQVRIDWNgGAWjYBSMAtIAIxD/B+IvUPkfCpgY8AGofBaofA8ofx4og2pC8S9Q+S9Q+RwYPwPio9X9p+pI8hIofwpUR9KRpEBZ0gIl6UfSkaRDWVIBZckP1JF0SIs6pIKGpFMaUmIDWkgH9EgHHmkiDWhSArRIR5pIB0ZIB+mRTgxIB/YkAnuSNpKB/UhK+idpIxlIIDnoE8k98YEkDqSAlMBfUnviBykcSAn8JR0kYpDEgZTAH9IhowNInKQF/pAOmRZIYpE68Id0yAxHFpM68Id0yGxXFpM68Id0yOywZDGpA39Ih8wNZTHSAn9Ih8wN9EASL9IDf0iHzAtM90gL/CEdMj8w3CMt8Id0yIJAdY+0wB/SIQsDAzzSAn9Ih2yAn7pHTv6YBeQAAOaU6N9/l8q3AAAAAElFTkSuQmCC',
        junk: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAABGdBTUEAALGPC/xhBQAAACBjSFJNAAB6JgAAgIQAAPoAAACA6AAAdTAAAOpgAAA6mAAAF3CculE8AAAACXBIWXMAAAsTAAALEwEAmpwYAAABRElEQVRIDWNgGAWjYBSMAtIAIxD/B+IvUPkfCpgY8AGofBaofA8ofx4og2pC8S9Q+S9Q+RwYPwPio9X9p+pI8hIofwpUR9KRpEBZ0gIl6UfSkaRDWVIBZckP1JF0SIs6pIKGpFMaUmIDWkgH9EgHHmkiDWhSArRIR5pIB0ZIB+mRTgxIB/YkAnuSNpKB/UhK+idpIxlIIDnoE8k98YEkDqSAlMBfUnviBykcSAn8JR0kYpDEgZTAH9IhowNInKQF/pAOmRZIYpE68Id0yAxHFpM68Id0yGxXFpM68Id0yOywZDGpA39Ih8wNZTHSAn9Ih8wN9EASL9IDf0iHzAtM90gL/CEdMj8w3CMt8Id0yIJAdY+0wB/SIQsDAzzSAn9Ih2yAn7pHTv6YBeQAAInrYq9/nN1NAAAAAElFTkSuQmCC',
        book: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAABGdBTUEAALGPC/xhBQAAACBjSFJNAAB6JgAAgIQAAPoAAACA6AAAdTAAAOpgAAA6mAAAF3CculE8AAAACXBIWXMAAAsTAAALEwEAmpwYAAABJElEQVRIDWNgGAWjYBSMAtIAIxD/B+IvUPkfCpgY8AGofBaofA8ofx4og2pC8S9Q+S9Q+RwYPwPio9X9p+pI8hIofwpUR9KRpEBZ0gIl6UfSkaRDWVIBZckP1JF0SIs6pIKGpFMaUmIDWkgH9EgHHmkiDWhSArRIR5pIB0ZIB+mRTgxIB/YkAnuSNpKB/UhK+idpIxlIIDnoE8k98YEkDqSAlMBfUnviBykcSAn8JR0kYpDEgZTAH9IhowNInKQF/pAOmRZIYpE68Id0yAxHFpM68Id0yGxXFpM68Id0yOywZDGpA39Ih8wNZTHSAn9Ih8wN9EASL9IDf0iHzAtM90gL/CEdMj8w3CMt8Id0yIJAdY+0wB/SIQsDAzzSAn9Ih2yAn7pHTv6YBeQAAIl6Y69/ntqNAAAAAElFTkSuQmCC'
    };

    let stats = { hp: 100, weight: 20, intel: 0 };
    let currentQuiz = null;
    const questions = [
        { q: "Có người lạ cho kẹo ở cổng trường?", a: "Nhận kẹo ngay", b: "Từ chối, đi chỗ khác", c: "B" },
        { q: "Thấy khói cháy trong nhà con làm gì?", a: "Bịt mũi, bò thấp xuống", b: "Núp vào gầm giường", c: "A" },
        { q: "Đi lạc trong siêu thị con tìm ai?", a: "Chạy ra đường tìm mẹ", b: "Tìm chú bảo vệ/nhân viên", c: "B" }
    ];

    const config = {
        type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
        backgroundColor: '#2ecc71', physics: { default: 'arcade' },
        scene: { preload: preload, create: create, update: update }
    };

    let player, cursors, foods, dangers, lessons;
    const game = new Phaser.Game(config);

    function preload() {
        this.load.image('player', assets.player);
        this.load.image('apple', assets.apple);
        this.load.image('junk', assets.junk);
        this.load.image('book', assets.book);
    }

    function create() {
        window.gameScene = this;
        // Vẽ thêm hoa cỏ cho sinh động
        for (let i = 0; i < 20; i++) {
            this.add.circle(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 2, 0xffffff, 0.5);
        }

        player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'player');
        player.setCollideWorldBounds(true).setScale(1.5);

        foods = this.physics.add.group();
        dangers = this.physics.add.group();
        lessons = this.physics.add.group();

        const spawn = (group, key) => {
            let item = this.physics.add.sprite(Phaser.Math.Between(50, window.innerWidth-50), Phaser.Math.Between(50, window.innerHeight-50), key);
            group.add(item);
        };

        for(let i=0; i<4; i++) spawn(foods, 'apple');
        for(let i=0; i<3; i++) spawn(dangers, 'junk');
        spawn(lessons, 'book');

        this.physics.add.overlap(player, foods, (p, f) => { f.destroy(); stats.hp = Math.min(100, stats.hp+5); updateUI(); spawn(foods, 'apple'); });
        this.physics.add.overlap(player, dangers, (p, d) => { d.destroy(); stats.hp -= 20; this.cameras.main.shake(150, 0.01); updateUI(); spawn(dangers, 'junk'); });
        this.physics.add.overlap(player, lessons, (p, l) => { l.destroy(); this.scene.pause(); showQuiz(); });

        cursors = this.input.keyboard.createCursorKeys();
    }

    function update() {
        if (!player.body) return;
        player.body.setVelocity(0);
        if (cursors.left.isDown) { player.setVelocityX(-250); player.setFlipX(true); }
        else if (cursors.right.isDown) { player.setVelocityX(250); player.setFlipX(false); }
        if (cursors.up.isDown) player.setVelocityY(-250);
        else if (cursors.down.isDown) player.setVelocityY(250);
    }

    function updateUI() {
        document.getElementById('hp').innerText = stats.hp;
        document.getElementById('weight').innerText = stats.weight;
        document.getElementById('intel').innerText = stats.intel;
    }

    function showQuiz() {
        currentQuiz = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-text').innerText = currentQuiz.q;
        document.getElementById('btnA').innerText = "A: " + currentQuiz.a;
        document.getElementById('btnB').innerText = "B: " + currentQuiz.b;
        document.getElementById('quiz-box').style.display = 'block';
    }

    window.handleAns = function(ans) {
        document.getElementById('quiz-box').style.display = 'none';
        if (ans === currentQuiz.c) { alert("🌟 Bé giỏi quá! +20 Trí tuệ."); stats.intel += 20; }
        else { alert("❌ Nguy hiểm lắm! Bé bị trừ máu rồi."); stats.hp -= 20; }
        updateUI();
        let l = window.gameScene.physics.add.sprite(Phaser.Math.Between(50, window.innerWidth-50), Phaser.Math.Between(50, window.innerHeight-50), 'book');
        lessons.add(l);
        window.gameScene.scene.resume();
        if (stats.hp <= 0) { alert("Bé kiệt sức rồi!"); location.reload(); }
    };
</script>
</body>
</html>
