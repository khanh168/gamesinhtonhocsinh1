<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bé Trưởng Thành - Fix Hiển Thị</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { border: 4px solid #4ecdc4; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { margin-bottom: 10px; display: flex; gap: 20px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="ui">
        <span>❤️ <span id="hp">100</span>%</span>
        <span>⚖️ <span id="weight">20</span>kg</span>
        <span>🧠 <span id="intel">0</span></span>
        <span>💰 <span id="money">50</span>đ</span>
    </div>

    <div id="game-container"></div>

    <p>Dùng 4 phím mũi tên để di chuyển khối màu hồng</p>

<script>
    const config = {
        type: Phaser.AUTO,
        parent: 'game-container',
        width: 800,
        height: 500,
        backgroundColor: '#2c3e50',
        physics: { default: 'arcade' },
        scene: { create: create, update: update }
    };

    let player, cursors, items;
    let stats = { hp: 100, weight: 20, intel: 0, money: 50 };
    const game = new Phaser.Game(config);

    function create() {
        // Vẽ nhân vật ngay giữa khung hình
        player = this.add.rectangle(400, 250, 40, 40, 0xff6b6b);
        this.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);

        // Tạo vật phẩm tĩnh để dễ nhìn thấy
        items = this.physics.add.group();
        
        // Tạo 3 hạt màu ở 3 vị trí cố định
        createSeed(200, 200, 0x2ecc71, 'food'); // Xanh
        createSeed(600, 200, 0xe74c3c, 'danger'); // Đỏ
        createSeed(400, 400, 0xf1c40f, 'study'); // Vàng

        this.physics.add.overlap(player, items, (p, item) => {
            if(item.type === 'food') { stats.hp = Math.min(100, stats.hp + 5); }
            if(item.type === 'danger') { stats.hp -= 10; this.cameras.main.shake(100, 0.01); }
            if(item.type === 'study') { stats.intel += 10; }
            
            // Đổi chỗ hạt khi ăn xong
            item.x = Phaser.Math.Between(100, 700);
            item.y = Phaser.Math.Between(100, 400);
            updateUI();
        });

        cursors = this.input.keyboard.createCursorKeys();
    }

    function createSeed(x, y, color, type) {
        let seed = game.scene.scenes[0].add.circle(x, y, 15, color);
        items.add(seed);
        seed.type = type;
    }

    function update() {
        player.body.setVelocity(0);
        if (cursors.left.isDown) player.body.setVelocityX(-300);
        if (cursors.right.isDown) player.body.setVelocityX(300);
        if (cursors.up.isDown) player.body.setVelocityY(-300);
        if (cursors.down.isDown) player.body.setVelocityY(300);
    }

    function updateUI() {
        document.getElementById('hp').innerText = stats.hp;
        document.getElementById('weight').innerText = stats.weight;
        document.getElementById('intel').innerText = stats.intel;
        document.getElementById('money').innerText = stats.money;
    }
</script>
</body>
</html>
