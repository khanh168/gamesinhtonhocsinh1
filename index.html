<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bé Tập Sinh Tồn - Level 1</title>
    <script src="phaser.min.js"></script>
    <style>
        body { margin: 0; background: #2c3e50; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 2px solid #4ecdc4; pointer-events: none; }
        .stat { font-size: 18px; margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">❤️ Sức khỏe: <span id="hp">100</span>%</div>
        <div class="stat">⚖️ Cân nặng: <span id="weight">20</span>kg</div>
        <div class="stat">🧠 Trí tuệ: <span id="intel">0</span></div>
        <hr>
        <div style="color: #4ecdc4; font-size: 14px;">Nhiệm vụ: Ăn hạt Xanh (Tốt) <br> Tránh hạt Đỏ (Xấu)</div>
    </div>

<script>
    window.onload = function() {
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#34495e',
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        let player, head, cursors, foods, dangers;
        let stats = { hp: 100, weight: 20, intel: 0 };
        const game = new Phaser.Game(config);

        function create() {
            // 1. Tạo "Bé nhân vật" (Thân vuông + Đầu tròn)
            player = this.add.container(window.innerWidth/2, window.innerHeight/2);
            let body = this.add.rectangle(0, 10, 40, 50, 0xff6b6b); // Thân
            let face = this.add.circle(0, -25, 20, 0xffccaa); // Đầu
            player.add([body, face]);
            
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            player.body.setSize(40, 70); // Kích thước va chạm

            // 2. Tạo nhóm đồ ăn TỐT (Xanh lá)
            foods = this.physics.add.group();
            for(let i=0; i<5; i++) {
                spawnItem(foods, 0x2ecc71, this);
            }

            // 3. Tạo nhóm đồ ăn XẤU (Đỏ - như Gà rán/Snack quá nhiều)
            dangers = this.physics.add.group();
            for(let i=0; i<3; i++) {
                spawnItem(dangers, 0xe74c3c, this);
            }

            // Xử lý va chạm
            this.physics.add.overlap(player, foods, (p, f) => {
                f.destroy();
                stats.hp = Math.min(100, stats.hp + 5);
                stats.weight += 0.1;
                updateUI();
                spawnItem(foods, 0x2ecc71, this);
            });

            this.physics.add.overlap(player, dangers, (p, d) => {
                d.destroy();
                stats.hp -= 15;
                stats.weight += 1.5; // Ăn đồ xấu tăng cân rất nhanh
                this.cameras.main.shake(100, 0.01);
                updateUI();
                spawnItem(dangers, 0xe74c3c, this);
            });

            cursors = this.input.keyboard.createCursorKeys();
        }

        function spawnItem(group, color, scene) {
            let x = Phaser.Math.Between(50, window.innerWidth-50);
            let y = Phaser.Math.Between(50, window.innerHeight-50);
            let item = scene.add.circle(x, y, 15, color);
            group.add(item);
        }

        function update() {
            player.body.setVelocity(0);
            if (cursors.left.isDown) player.body.setVelocityX(-250);
            else if (cursors.right.isDown) player.body.setVelocityX(250);
            if (cursors.up.isDown) player.body.setVelocityY(-250);
            else if (cursors.down.isDown) player.body.setVelocityY(250);

            if (stats.hp <= 0) {
                alert("Bé mệt quá rồi! Hãy chọn đồ ăn lành mạnh (màu xanh) nhé.");
                location.reload();
            }
        }

        function updateUI() {
            document.getElementById('hp').innerText = stats.hp;
            document.getElementById('weight').innerText = stats.weight.toFixed(1);
            document.getElementById('intel').innerText = stats.intel;
        }
    };
</script>
</body>
</html>
