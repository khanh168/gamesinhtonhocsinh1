<!DOCTYPE html>
<html>
<head>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
        canvas { border: 5px solid #fff; border-radius: 10px; }
    </style>
</head>
<body>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 0 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    let player;
    let cursors;
    let health = 100;
    let weight = 20;
    let healthText;
    let foods;
    let dangers;

    const game = new Phaser.Game(config);

    function preload() {
        // Load hình ảnh từ server demo của Phaser
        this.load.image('sky', 'https://phaser.io');
        this.load.image('apple', 'https://phaser.io');
        this.load.image('fire', 'https://phaser.io'); // Tạm dùng ghost làm vật cản
        this.load.spritesheet('dude', 'https://phaser.io', { frameWidth: 32, frameHeight: 48 });
    }

    function create() {
        // 1. Nền
        this.add.image(400, 300, 'sky');

        // 2. Nhân vật
        player = this.physics.add.sprite(100, 450, 'dude');
        player.setCollideWorldBounds(true);

        // Animation di chuyển
        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });
        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });

        // 3. Đồ ăn & Chướng ngại vật
        foods = this.physics.add.group({ key: 'apple', repeat: 3, setXY: { x: 200, y: 200, stepX: 150 } });
        dangers = this.physics.add.group({ key: 'fire', repeat: 2, setXY: { x: 300, y: 400, stepX: 200 } });

        // 4. Hiển thị chỉ số
        healthText = this.add.text(16, 16, 'Sức khỏe: 100% | Cân nặng: 20kg', { fontSize: '24px', fill: '#fff', backgroundColor: '#ff6b6b', padding: 5 });

        // 5. Xử lý va chạm
        this.physics.add.overlap(player, foods, eatFood, null, this);
        this.physics.add.overlap(player, dangers, hitDanger, null, this);

        cursors = this.input.keyboard.createCursorKeys();
    }

    function update() {
        // Điều khiển nhân vật
        if (cursors.left.isDown) {
            player.setVelocityX(-160);
            player.anims.play('left', true);
        } else if (cursors.right.isDown) {
            player.setVelocityX(160);
            player.anims.play('right', true);
        } else {
            player.setVelocityX(0);
        }

        if (cursors.up.isDown) {
            player.setVelocityY(-160);
        } else if (cursors.down.isDown) {
            player.setVelocityY(160);
        } else {
            player.setVelocityY(0);
        }
    }

    function eatFood(player, food) {
        food.disableBody(true, true);
        health += 10;
        weight += 0.5;
        updateStats();
    }

    function hitDanger(player, danger) {
        danger.disableBody(true, true);
        health -= 20;
        updateStats();
        player.setTint(0xff0000);
        setTimeout(() => player.clearTint(), 500);
    }

    function updateStats() {
        healthText.setText(`Sức khỏe: ${health}% | Cân nặng: ${weight.toFixed(1)}kg`);
        if (health <= 0) {
            alert("Game Over! Bé cần chú ý an toàn hơn.");
            location.reload();
        }
    }
</script>

</body>
</html>
