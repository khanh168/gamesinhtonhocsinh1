<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Sinh Ton - Fix Lỗi Trình Duyệt</title>
    <!-- Tao dùng link dự phòng ổn định nhất -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { border: 5px solid #4ecdc4; }
    </style>
</head>
<body>

    <div id="game-container"></div>

<script>
    // Kiểm tra xem thư viện đã tải chưa
    window.onload = function() {
        if (typeof Phaser === 'undefined') {
            alert("Mạng của bạn chặn thư viện game rồi! Hãy thử dùng 4G.");
            return;
        }

        const config = {
            type: Phaser.CANVAS, // ÉP KIỂU CANVAS ĐỂ TRÁNH LỖI TRÌNH DUYỆT
            parent: 'game-container',
            width: 800,
            height: 600,
            backgroundColor: '#2c3e50',
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        let player, cursors;
        const game = new Phaser.Game(config);

        function create() {
            // Vẽ chữ và nhân vật ngay lập tức
            this.add.text(20, 20, 'DA KET NOI THANH CONG!', { fontSize: '32px', fill: '#2ecc71' });
            
            player = this.add.rectangle(400, 300, 50, 50, 0xff6b6b);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            
            cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            if (!player.body) return;
            player.body.setVelocity(0);
            if (cursors.left.isDown) player.body.setVelocityX(-300);
            if (cursors.right.isDown) player.body.setVelocityX(300);
            if (cursors.up.isDown) player.body.setVelocityY(-300);
            if (cursors.down.isDown) player.body.setVelocityY(300);
        }
    };
</script>
</body>
</html>
