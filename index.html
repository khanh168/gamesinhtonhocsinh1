<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Sinh Ton Noi Bo</title>
    <!-- Gọi file phaser bạn vừa up lên GitHub -->
    <script src="phaser.min.js"></script>
    <style>
        body { margin: 0; background: #2c3e50; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #status { color: white; position: absolute; top: 10px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="status">Nếu hiện hình vuông đỏ là thành công!</div>
<script>
    window.onload = function() {
        if (typeof Phaser === 'undefined') {
            document.getElementById('status').innerHTML = 'LỖI: File phaser.min.js chưa nằm cùng thư mục với index.html';
            return;
        }

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 600,
            backgroundColor: '#34495e',
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        let player, cursors;
        new Phaser.Game(config);

        function create() {
            document.getElementById('status').innerHTML = 'DI CHUYỂN BẰNG PHÍM MŨI TÊN';
            player = this.add.rectangle(400, 300, 60, 60, 0xff6b6b);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            if (!player.body) return;
            player.body.setVelocity(0);
            if (cursors.left.isDown) player.body.setVelocityX(-300);
            else if (cursors.right.isDown) player.body.setVelocityX(300);
            if (cursors.up.isDown) player.body.setVelocityY(-300);
            else if (cursors.down.isDown) player.body.setVelocityY(300);
        }
    };
</script>
</body>
</html>
