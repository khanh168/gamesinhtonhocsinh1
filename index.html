<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Trưởng Thành - Sinh Tồn Học Đường</title>
    <!-- GỌI FILE NỘI BỘ MÀY ĐÃ UP - CHỐNG ĐEN MÀN HÌNH -->
    <script src="phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #status-bar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.95);
            padding: 10px; border-radius: 50px; display: flex; justify-content: space-around;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #4ecdc4; z-index: 100;
        }
        .stat-box { text-align: center; color: #333; font-weight: bold; font-size: 13px; }
        .stat-val { color: #ff6b6b; font-size: 17px; display: block; }
        #quiz-box {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 25px; border: 6px solid #f1c40f;
            width: 85%; max-width: 380px; text-align: center; z-index: 1000;
        }
        .ans-btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        #mobile-controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: 60px 60px 60px; gap: 10px; z-index: 50; }
        .joy-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.4); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #fff; user-select: none; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="stat-box">❤️ MÁU <span id="hp" class="stat-val">100</span></div>
        <div class="stat-box">⚖️ CÂN <span id="weight" class="stat-val">20</span></div>
        <div class="stat-box">🧠 TRÍ TUỆ <span id="intel" class="stat-val">0</span></div>
    </div>

    <div id="quiz-box">
        <h2 style="color: #2c3e50; margin-top: 0; font-size: 20px;">💡 CÂU HỎI KỸ NĂNG</h2>
        <p id="q-text" style="font-size: 17px; color: #444; margin-bottom: 20px;"></p>
        <button id="btnA" class="ans-btn" style="background: #3498db;" onclick="submitAnswer('A')"></button>
        <button id="btnB" class="ans-btn" style="background: #e67e22;" onclick="submitAnswer('B')"></button>
    </div>

    <div id="mobile-controls">
        <div></div><div class="joy-btn" onpointerdown="setMove('up')" onpointerup="setMove(null)">↑</div><div></div>
        <div class="joy-btn" onpointerdown="setMove('left')" onpointerup="setMove(null)">←</div>
        <div class="joy-btn" onpointerdown="setMove('down')" onpointerup="setMove(null)">↓</div>
        <div class="joy-btn" onpointerdown="setMove('right')" onpointerup="setMove(null)">→</div>
    </div>

<script>
    let gameState = { hp: 100, weight: 20, intel: 0, moveDir: null };
    let currentQuizData = null;
    let phaserScene = null;
    let player, lessonsGroup;

    const quizList = [
        { q: "Khi thấy khói trong nhà con làm gì?", a: "Bịt mũi, bò thấp", b: "Nấp dưới gầm giường", c: "A" },
        { q: "Người lạ cho kẹo ở cổng trường?", a: "Nhận kẹo ngay", b: "Từ chối lịch sự", c: "B" },
        { q: "Lạc mẹ ở siêu thị con tìm ai?", a: "Chạy ra cửa tìm", b: "Tìm chú bảo vệ", c: "B" }
    ];

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade' },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    function preload() {
        // Link ảnh dự phòng 100% hiện
        this.load.image('bg', 'https://ibb.co');
        this.load.image('player', 'https://ibb.co');
        this.load.image('apple', 'https://ibb.co');
        this.load.image('junk', 'https://ibb.co');
        this.load.image('book', 'https://ibb.co');
    }

    function create() {
        phaserScene = this;
        let bg = this.add.image(window.innerWidth/2, window.innerHeight/2, 'bg');
        bg.setScale(Math.max(window.innerWidth/bg.width, window.innerHeight/bg.height));

        player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'player');
        player.setCollideWorldBounds(true).setScale(0.18).setDepth(10);

        const foods = this.physics.add.group();
        const dangers = this.physics.add.group();
        lessonsGroup = this.physics.add.group();

        const spawnItem = (group, key, sc) => {
            let item = this.physics.add.sprite(Phaser.Math.Between(50, window.innerWidth-50), Phaser.Math.Between(150, window.innerHeight-50), key);
            item.setScale(sc);
            group.add(item);
        };

        for(let i=0; i<3; i++) spawnItem(foods, 'apple', 0.25);
        for(let i=0; i<2; i++) spawnItem(dangers, 'junk', 0.4);
        spawnItem(lessonsGroup, 'book', 0.25);

        this.physics.add.overlap(player, foods, (p, f) => {
            f.destroy(); gameState.hp = Math.min(100, gameState.hp + 5); 
            updateUI(); spawnItem(foods, 'apple', 0.25);
        });

        this.physics.add.overlap(player, dangers, (p, d) => {
            d.destroy(); gameState.hp -= 20; this.cameras.main.shake(100, 0.01); 
            updateUI(); spawnItem(dangers, 'junk', 0.4);
        });

        this.physics.add.overlap(player, lessonsGroup, (p, l) => {
            l.destroy();
            this.scene.pause();
            openQuiz();
        });

        this.cursors = this.input.keyboard.createCursorKeys();
    }

    function update() {
        if (!player || !player.body) return;
        player.body.setVelocity(0);
        if (this.cursors.left.isDown || gameState.moveDir === 'left') { player.setVelocityX(-260); player.setFlipX(true); }
        else if (this.cursors.right.isDown || gameState.moveDir === 'right') { player.setVelocityX(260); player.setFlipX(false); }
        if (this.cursors.up.isDown || gameState.moveDir === 'up') player.setVelocityY(-260);
        else if (this.cursors.down.isDown || gameState.moveDir === 'down') player.setVelocityY(260);
    }

    window.setMove = (dir) => { gameState.moveDir = dir; };

    function openQuiz() {
        currentQuizData = quizList[Math.floor(Math.random() * quizList.length)];
        document.getElementById('q-text').innerText = currentQuizData.q;
        document.getElementById('btnA').innerText = "A: " + currentQuizData.a;
        document.getElementById('btnB').innerText = "B: " + currentQuizData.b;
        document.getElementById('quiz-box').style.display = 'block';
    }

    window.submitAnswer = function(ans) {
        document.getElementById('quiz-box').style.display = 'none';
        if (ans === currentQuizData.c) { alert("🌟 ĐÚNG RỒI! Bé giỏi quá."); gameState.intel += 20; }
        else { alert("❌ SAI RỒI! Bé bị trừ máu."); gameState.hp -= 20; }
        updateUI();
        let l = phaserScene.physics.add.sprite(Phaser.Math.Between(50, window.innerWidth-50), Phaser.Math.Between(150, window.innerHeight-50), 'book').setScale(0.25);
        lessonsGroup.add(l);
        phaserScene.scene.resume();
    }

    function updateUI() {
        document.getElementById('hp').innerText = gameState.hp;
        document.getElementById('weight').innerText = gameState.weight;
        document.getElementById('intel').innerText = gameState.intel;
        if (gameState.hp <= 0) { alert("Bé kiệt sức!"); location.reload(); }
    }
</script>
</body>
</html>
