<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- Link thư viện dự phòng cực kỳ ổn định -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        backgroundColor: '#34495e', // Thêm màu nền để biết game đã chạy
        physics: { default: 'arcade' },
        scene: { create: create }
    };

    const game = new Phaser.Game(config);

    function create() {
        // Vẽ chữ lên màn hình
        this.add.text(200, 250, 'CHÚC MỪNG!', { fontSize: '48px', fill: '#2ecc71', fontStyle: 'bold' });
        this.add.text(220, 320, 'Game Sinh Tồn đã hoạt động', { fontSize: '24px', fill: '#ffffff' });
        
        // Tạo một hình vuông di động để test
        const rect = this.add.rectangle(400, 450, 50, 50, 0xe74c3c);
        this.tweens.add({
            targets: rect,
            y: 500,
            duration: 1000,
            yoyo: true,
            repeat: -1
        });
    }
</script>
</body>
</html>
