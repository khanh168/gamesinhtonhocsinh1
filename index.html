<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Trưởng Thành - Bản Ổn Định</title>
    <!-- Gọi file phaser bạn đã up lên GitHub -->
    <script src="phaser.min.js"></script>
    <style>
        body { margin: 0; background: #2c3e50; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 10px; border: 2px solid #4ecdc4; pointer-events: none; z-index: 10; }
        #quiz-box { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; width: 80%; max-width: 350px; text-align: center; z-index: 100; border: 5px solid #4ecdc4; }
        .btn-ans { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div id="ui">
        ❤️ HP: <span id="hp">100</span>% | ⚖️ <span id="weight">20</span>kg<br>
        🧠 Trí tuệ: <span id="intel">0</span>
    </div>

    <div id="quiz-box">
        <h3 id="q-text" style="color: #333;">Câu hỏi?</h3>
        <button id="btnA" class="btn-ans" style="background: #3498db;" onclick="checkAns('A')"></button>
        <button id="btnB" class="btn-ans" style="background: #e67e22;" onclick="checkAns('B')"></button>
    </div>

<script>
    let stats = { hp: 100, weight: 20, intel: 0 };
    let currentQ = null;
    let player, sceneRef;

    const questions = [
        { q: "Người lạ cho kẹo ở trường?", a: "Ăn luôn", b: "Từ chối ngay", c: "B" },
        { q: "Thấy khói cháy trong nhà?", a: "Bịt mũi, bò thấp", b: "Núp trong tủ", c: "A" },
        { q: "Bị lạc trong siêu thị?", a: "Chạy ra đường tìm", b: "Tìm chú bảo vệ", c: "B" }
    ];

    window.onload = function() {
        if (typeof Phaser === 'undefined') {
            alert("Lỗi: Không tìm thấy phaser.min.js trên GitHub!");
            return;
        }

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#34495e',
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function create() {
            sceneRef = this;
            // Nhân vật
            player = this.add.container(window.innerWidth/2, window.innerHeight/2);
            player.add([this.add.rectangle(0, 10, 40, 50, 0xff6b6b), this.add.circle(0, -25, 20, 0xffccaa)]);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            // Nhóm vật phẩm
            this.foods = this.physics.add.group();
            this.dangers = this.physics.add.group();
            this.lessons = this.physics.add.group();

            const spawn = (group, color) => {
                let item = this.add.circle(Phaser.Math.Between(50, window.innerWidth-50), Phaser.Math.Between(50, window.innerHeight-50), 15, color);
                group.add(item);
            };

            for(let i=0; i<4; i++) spawn(this.foods, 0x2ecc71);
            for(let i=0; i<3; i++) spawn(this.dangers, 0xe74c3c);
            spawn(this.lessons, 0xf1c40f);

            // Va chạm
            this.physics.add.overlap(player, this.foods, (p, f) => { f.destroy(); stats.hp = Math.min(100, stats.hp+5); updateUI(); spawn(this.foods, 0x2ecc71); });
            this.physics.add.overlap(player, this.dangers, (p, d) => { d.destroy(); stats.hp -= 20; this.cameras.main.shake(100, 0.01); updateUI(); spawn(this.dangers, 0xe74c3c); });
            this.physics.add.overlap(player, this.lessons, (p, l) => { l.destroy(); this.scene.pause(); showQuiz(); });

            this.cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            if (!player.body) return;
            player.body.setVelocity(0);
            if (this.cursors.left.isDown) player.body.setVelocityX(-250);
            else if (this.cursors.right.isDown) player.body.setVelocityX(250);
            if (this.cursors.up.isDown) player.body.setVelocityY(-250);
            else if (this.cursors.down.isDown) player.body.setVelocityY(250);
        }
    };

    function showQuiz() {
        currentQ = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-text').innerText = currentQ.q;
        document.getElementById('btnA').innerText = "A: " + currentQ.a;
        document.getElementById('btnB').innerText = "B: " + currentQ.b;
        document.getElementById('quiz-box').style.display = 'block';
    }

    window.checkAns = function(ans) {
        document.getElementById('quiz-box').style.display = 'none';
        if (ans === currentQ.c) { alert("Chính xác! +20 Trí tuệ"); stats.intel += 20; }
        else { alert("Sai rồi! Bé cần cẩn thận hơn."); stats.hp -= 20; }
        updateUI();
        // Tạo lại hạt vàng sau khi trả lời
        let x = Math.random() * (window.innerWidth - 100) + 50;
        let y = Math.random() * (window.innerHeight - 100) + 50;
        let l = sceneRef.add.circle(x, y, 15, 0xf1c40f);
        sceneRef.physics.add.existing(l);
        sceneRef.physics.add.overlap(player, l, () => { l.destroy(); sceneRef.scene.pause(); showQuiz(); });
        
        sceneRef.scene.resume();
        if (stats.hp <= 0) { alert("Bé kiệt sức rồi!"); location.reload(); }
    }

    function updateUI() {
        document.getElementById('hp').innerText = stats.hp;
        document.getElementById('weight').innerText = stats.weight;
        document.getElementById('intel').innerText = stats.intel;
    }
</script>
</body>
</html>
