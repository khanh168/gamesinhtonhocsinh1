<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Trưởng Thành - Game Sinh Tồn</title>
    <!-- GỌI ĐÚNG FILE MÀY VỪA UP -->
    <script src="phaser.min.js"></script>
    <style>
        body { margin: 0; background: #2c3e50; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; pointer-events: none; border: 1px solid #4ecdc4; }
    </style>
</head>
<body>

    <div id="ui">
        <div>❤️ HP: <span id="hp">100</span>%</div>
        <div>⚖️ Cân nặng: <span id="weight">20</span>kg</div>
        <div>🧠 Trí tuệ: <span id="intel">0</span></div>
    </div>

<script>
    window.onload = function() {
        // Kiểm tra xem đã nhận thư viện chưa
        if (typeof Phaser === 'undefined') {
            alert("Lỗi: Không tìm thấy file phaser.min.js. Mày kiểm tra lại GitHub nhé!");
            return;
        }

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#34495e',
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        let player, cursors, foods;
        let stats = { hp: 100, weight: 20, intel: 0 };
        const game = new Phaser.Game(config);

        function create() {
            // Nhân vật chính (Hình vuông hồng)
            player = this.add.rectangle(window.innerWidth/2, window.innerHeight/2, 50, 50, 0xff6b6b);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            // Tạo đồ ăn (Các vòng tròn xanh)
            foods = this.physics.add.group();
            for(let i=0; i<5; i++) {
                let x = Phaser.Math.Between(50, window.innerWidth-50);
                let y = Phaser.Math.Between(50, window.innerHeight-50);
                let f = this.add.circle(x, y, 15, 0x2ecc71);
                foods.add(f);
            }

            // Va chạm: Ăn đồ ăn
            this.physics.add.overlap(player, foods, (p, f) => {
                f.x = Phaser.Math.Between(50, window.innerWidth-50);
                f.y = Phaser.Math.Between(50, window.innerHeight-50);
                stats.hp = Math.min(100, stats.hp + 2);
                stats.weight += 0.1;
                updateUI();
            });

            cursors = this.input.keyboard.createCursorKeys();
            this.add.text(window.innerWidth/2, 30, 'Dùng phím mũi tên để di chuyển', { fill: '#fff' }).setOrigin(0.5);
        }

        function update() {
            player.body.setVelocity(0);
            if (cursors.left.isDown) player.body.setVelocityX(-250);
            else if (cursors.right.isDown) player.body.setVelocityX(250);
            if (cursors.up.isDown) player.body.setVelocityY(-250);
            else if (cursors.down.isDown) player.body.setVelocityY(250);
        }

        function updateUI() {
            document.getElementById('hp').innerText = stats.hp;
            document.getElementById('weight').innerText = stats.weight.toFixed(1);
            document.getElementById('intel').innerText = stats.intel;
        }
    };
</script>
</body>
</html>
