<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Trưởng Thành - Bản Chống Lỗi V5</title>
    <script src="phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* UI Chỉ số */
        #status-bar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.9);
            padding: 10px; border-radius: 50px; display: flex; justify-content: space-around;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #4ecdc4; z-index: 100;
        }
        .stat-box { text-align: center; color: #333; font-weight: bold; font-size: 14px; }
        .stat-val { color: #ff6b6b; font-size: 18px; display: block; }

        /* Bảng câu hỏi */
        #quiz-box {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 25px; border: 6px solid #f1c40f;
            width: 85%; max-width: 380px; text-align: center; z-index: 1000;
        }
        .ans-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }

        /* Controller Mobile */
        .controller { position: absolute; bottom: 20px; right: 20px; display: grid; grid-template-columns: 65px 65px 65px; gap: 10px; z-index: 50; }
        .joy-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.4); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; user-select: none; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="stat-box">❤️ MÁU <span id="hp" class="stat-val">100</span></div>
        <div class="stat-box">⚖️ CÂN <span id="weight" class="stat-val">20</span></div>
        <div class="stat-box">🧠 TRÍ TUỆ <span id="intel" class="stat-val">0</span></div>
    </div>

    <div id="quiz-box">
        <h2 style="color: #2c3e50; margin-top: 0; font-size: 22px;">💡 THỬ THÁCH</h2>
        <p id="q-desc" style="font-size: 18px; color: #444; margin-bottom: 20px;"></p>
        <button id="btnA" class="ans-btn" style="background: #3498db;" onclick="handleAns('A')"></button>
        <button id="btnB" class="ans-btn" style="background: #e67e22;" onclick="handleAns('B')"></button>
    </div>

    <div class="controller">
        <div></div><div class="joy-btn" onpointerdown="move('up')" onpointerup="stop()">↑</div><div></div>
        <div class="joy-btn" onpointerdown="move('left')" onpointerup="stop()">←</div>
        <div class="joy-btn" onpointerdown="move('down')" onpointerup="stop()">↓</div>
        <div class="joy-btn" onpointerdown="move('right')" onpointerup="stop()">→</div>
    </div>

<script>
    let stats = { hp: 100, weight: 20, intel: 0 };
    let moveDir = null;
    let player, lessonsGroup;
    const questions = [
        { q: "Có người lạ cho kẹo ở cổng trường?", a: "Ăn luôn cho nóng", b: "Lịch sự từ chối", c: "B" },
        { q: "Có khói bốc lên trong nhà?", a: "Bịt mũi, bò thấp", b: "Núp trong tủ trốn", c: "A" },
        { q: "Lạc mẹ ở siêu thị?", a: "Chạy ra đường tìm", b: "Tìm cô nhân viên", c: "B" }
    ];
    let currentQ = null;

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade' },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    function preload() {
        this.load.image('bg', 'https://ibb.co');
        this.load.image('player', 'https://ibb.co');
        this.load.image('apple', 'https://ibb.co');
        this.load.image('junk', 'https://ibb.co');
        this.load.image('book', 'https://ibb.co');
    }

    function create() {
        window.gameScene = this;
        let bg = this.add.image(window.innerWidth/2, window.innerHeight/2, 'bg');
        let scale = Math.max(window.innerWidth / bg.width, window.innerHeight / bg.height);
        bg.setScale(scale).setScrollFactor(0);

        player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'player');
        player.setCollideWorldBounds(true).setScale(0.15).setDepth(10);

        const foods = this.physics.add.group();
        const dangers = this.physics.add.group();
        lessonsGroup = this.physics.add.group();

        const spawn = (group, key, sc) => {
            let item = this.physics.add.sprite(Phaser.Math.Between(50, window.innerWidth-50), Phaser.Math.Between(150, window.innerHeight-50), key);
            item.setScale(sc).setDepth(5);
            group.add(item);
        };

        for(let i=0; i<3; i++) spawn(foods, 'apple', 0.2);
        for(let i=0; i<2; i++) spawn(dangers, 'junk', 0.3);
        spawn(lessonsGroup, 'book', 0.2);

        this.physics.add.overlap(player, foods, (p, f) => { f.destroy(); stats.hp = Math.min(100, stats.hp+5); updateUI(); spawn(foods, 'apple', 0.2); });
        this.physics.add.overlap(player, dangers, (p, d) => { d.destroy(); stats.hp -= 20; this.cameras.main.shake(100, 0.01); updateUI(); spawn(dangers, 'junk', 0.3); });
        this.physics.add.overlap(player, lessonsGroup, (p, l) => { 
            l.destroy(); 
            this.scene.pause(); 
            showQuiz(); 
        });

        this.cursors = this.input.keyboard.createCursorKeys();
    }

    function update() {
        if (!player || !player.body) return;
        player.body.setVelocity(0);
        if (this.cursors.left.isDown || moveDir === 'left') { player.setVelocityX(-260); player.setFlipX(true); }
        else if (this.cursors.right.isDown || moveDir === 'right') { player.setVelocityX(260); player.setFlipX(false); }
        if (this.cursors.up.isDown || moveDir === 'up') player.setVelocityY(-260);
        else if (this.cursors.down.isDown || moveDir === 'down') player.setVelocityY(250);
    }

    window.move = (dir) => moveDir = dir;
    window.stop = () => moveDir = null;

    function showQuiz() {
        currentQ = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-desc').innerText = currentQ.q;
        document.getElementById('btnA').innerText = "A: " + currentQ.a;
        document.getElementById('btnB').innerText = "B: " + currentQ.b;
        document.getElementById('quiz-box').style.display = 'block';
    }

    window.handleAns = function(ans) {
        document.getElementById('quiz-box').style.display = 'none';
        if (ans === currentQ.c) { alert("🌟 ĐÚNG RỒI! +20 Trí tuệ"); stats.intel += 20; }
        else { alert("❌ SAI RỒI! Bé mất máu."); stats.hp -= 20; }
        updateUI();
        
        // Tạo lại sách an toàn
        let x = Math.random() * (window.innerWidth - 100) + 50;
        let y = Math.random() * (window.innerHeight - 150) + 150;
        let l = window.gameScene.physics.add.sprite(x, y, 'book').setScale(0.2);
        lessonsGroup.add(l);
        
        window.gameScene.scene.resume();
    }

    function updateUI() {
        document.getElementById('hp').innerText = stats.hp;
        document.getElementById('weight').innerText = stats.weight;
        document.getElementById('intel').innerText = stats.intel;
        if (stats.hp <= 0) { alert("Bé mệt quá rồi!"); location.reload(); }
    }
</script>
</body>
</html>
