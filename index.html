<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Tập Sinh Tồn Pro</title>
    <!-- Thư viện cực ổn định từ Microsoft -->
    <script src="https://prodigygame.com"></script>
    <style>
        body { margin: 0; background: #2c3e50; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #ui-layer {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8);
            color: white; padding: 15px; border-radius: 15px; border: 2px solid #4ecdc4;
            pointer-events: none; z-index: 10; min-width: 200px;
        }
        .stat-item { font-size: 18px; margin: 5px 0; font-weight: bold; display: flex; justify-content: space-between; }
        #quiz-screen {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 25px; box-shadow: 0 0 100px rgba(0,0,0,0.8);
            width: 85%; max-width: 450px; text-align: center; z-index: 100;
        }
        .ans-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .ans-btn:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-item"><span>❤️ Sức khỏe:</span> <span id="hp">100</span>%</div>
        <div class="stat-item"><span>⚖️ Cân nặng:</span> <span id="weight">20</span>kg</div>
        <div class="stat-item"><span>🧠 Trí tuệ:</span> <span id="intel">0</span></div>
        <div style="color: #f1c40f; font-size: 13px; margin-top: 5px; text-align: center;">Di chuyển ăn hạt VÀNG để học bài!</div>
    </div>

    <div id="quiz-screen">
        <h2 id="q-text" style="color: #2c3e50; margin-bottom: 20px;">Câu hỏi?</h2>
        <button id="btnA" class="ans-btn" style="background: #3498db; color: white;" onclick="checkAns('A')"></button>
        <button id="btnB" class="ans-btn" style="background: #e67e22; color: white;" onclick="checkAns('B')"></button>
    </div>

<script>
    let stats = { hp: 100, weight: 20, intel: 0 };
    let currentQ = null;
    let player, cursors, foods, dangers, lessons, sceneContext;

    const questions = [
        { q: "Thấy người lạ cho kẹo ở cổng trường?", a: "Ăn luôn cho nóng", b: "Cảm ơn và từ chối ngay", c: "B" },
        { q: "Có khói bốc lên trong bếp, con làm gì?", a: "Lấy khăn ướt bịt mũi, bò thấp", b: "Chạy vào gầm giường trốn", c: "A" },
        { q: "Đi siêu thị bị lạc mất bố mẹ?", a: "Chạy ra đường tìm", b: "Đứng yên hoặc tìm chú bảo vệ", c: "B" },
        { q: "Khi đi bộ qua đường con đi đâu?", a: "Đi trên vạch kẻ đường cho người đi bộ", b: "Chạy thật nhanh qua bất cứ đâu", c: "A" }
    ];

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: '#34495e',
        physics: { default: 'arcade' },
        scene: { create: create, update: update }
    };

    const game = new Phaser.Game(config);

    function create() {
        sceneContext = this;

        // 1. Tạo nhân vật (Đầu tròn thân vuông)
        player = this.add.container(window.innerWidth/2, window.innerHeight/2);
        player.add([
            this.add.rectangle(0, 10, 40, 50, 0xff6b6b), // Thân
            this.add.circle(0, -25, 20, 0xffccaa)       // Đầu
        ]);
        this.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);

        // 2. Các nhóm vật phẩm
        foods = this.physics.add.group();   // Xanh (Tốt)
        dangers = this.physics.add.group(); // Đỏ (Xấu)
        lessons = this.physics.add.group(); // Vàng (Học tập)

        for(let i=0; i<4; i++) spawn(foods, 0x2ecc71);
        for(let i=0; i<3; i++) spawn(dangers, 0xe74c3c);
        spawn(lessons, 0xf1c40f);

        // 3. Xử lý va chạm
        this.physics.add.overlap(player, foods, (p, f) => {
            f.destroy(); stats.hp = Math.min(100, stats.hp + 5); 
            stats.weight += 0.1; updateUI(); spawn(foods, 0x2ecc71);
        });

        this.physics.add.overlap(player, dangers, (p, d) => {
            d.destroy(); stats.hp -= 20; stats.weight += 1.2;
            this.cameras.main.shake(150, 0.01);
            updateUI(); spawn(dangers, 0xe74c3c);
        });

        this.physics.add.overlap(player, lessons, (p, l) => {
            l.destroy();
            this.scene.pause();
            showQuiz();
        });

        cursors = this.input.keyboard.createCursorKeys();
    }

    function spawn(group, color) {
        let x = Phaser.Math.Between(50, window.innerWidth - 50);
        let y = Phaser.Math.Between(50, window.innerHeight - 50);
        let item = sceneContext.add.circle(x, y, 15, color);
        group.add(item);
    }

    function update() {
        if (!player.body) return;
        player.body.setVelocity(0);
        if (cursors.left.isDown) player.body.setVelocityX(-280);
        else if (cursors.right.isDown) player.body.setVelocityX(280);
        if (cursors.up.isDown) player.body.setVelocityY(-280);
        else if (cursors.down.isDown) player.body.setVelocityY(280);

        if (stats.hp <= 0) {
            alert("Bé kiệt sức rồi! Hãy ăn uống điều độ và học kỹ năng nhé.");
            location.reload();
        }
    }

    function showQuiz() {
        currentQ = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-text').innerText = currentQ.q;
        document.getElementById('btnA').innerText = currentQ.a;
        document.getElementById('btnB').innerText = currentQ.b;
        document.getElementById('quiz-screen').style.display = 'block';
    }

    window.checkAns = function(ans) {
        document.getElementById('quiz-screen').style.display = 'none';
        if (ans === currentQ.c) {
            alert("🌟 CHÍNH XÁC! Con được cộng 20 điểm Trí tuệ.");
            stats.intel += 20;
        } else {
            alert("❌ SAI RỒI! Con cần cẩn thận hơn để bảo vệ bản thân.");
            stats.hp -= 20;
        }
        updateUI();
        spawn(lessons, 0xf1c40f);
        sceneContext.scene.resume();
    }

    function updateUI() {
        document.getElementById('hp').innerText = stats.hp;
        document.getElementById('weight').innerText = stats.weight.toFixed(1);
        document.getElementById('intel').innerText = stats.intel;
    }
</script>
</body>
</html>
