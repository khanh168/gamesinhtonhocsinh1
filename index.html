<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Trưởng Thành - Hành Trình Sân Trường</title>
    <script src="phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* Giao diện UI kiểu hiện đại */
        #status-bar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px; border-radius: 50px; display: flex; justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 3px solid #4ecdc4; z-index: 10;
        }
        .stat-box { text-align: center; color: #333; font-weight: bold; font-size: 14px; }
        .stat-val { color: #ff6b6b; font-size: 18px; display: block; }

        /* Bảng câu hỏi kiểu hoạt hình */
        #quiz-box {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 30px; border-radius: 30px; border: 8px solid #f1c40f;
            width: 85%; max-width: 400px; text-align: center; z-index: 100;
        }
        .ans-btn { 
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 15px; 
            cursor: pointer; font-weight: bold; color: white; font-size: 16px; transition: 0.2s;
        }

        /* Cụm nút di chuyển Mobile tinh tế hơn */
        .controller { position: absolute; bottom: 30px; right: 30px; display: grid; grid-template-columns: 70px 70px 70px; gap: 10px; z-index: 20; opacity: 0.6; }
        .joy-btn { width: 70px; height: 70px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #333; box-shadow: 0 4px 0 #ccc; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="stat-box">❤️ SỨC KHỎE <span id="hp" class="stat-val">100</span></div>
        <div class="stat-box">⚖️ CÂN NẶNG <span id="weight" class="stat-val">20</span></div>
        <div class="stat-box">🧠 TRÍ TUỆ <span id="intel" class="stat-val">0</span></div>
    </div>

    <div id="quiz-box">
        <h2 id="q-text" style="color: #2c3e50; margin-top: 0;">THỬ THÁCH!</h2>
        <p id="q-desc" style="font-size: 18px; color: #555;">Câu hỏi sinh tồn?</p>
        <button id="btnA" class="ans-btn" style="background: #3498db;" onclick="handleAns('A')"></button>
        <button id="btnB" class="ans-btn" style="background: #e67e22;" onclick="handleAns('B')"></button>
    </div>

    <div class="controller">
        <div></div><div class="joy-btn" onpointerdown="move('up')" onpointerup="stop()">↑</div><div></div>
        <div class="joy-btn" onpointerdown="move('left')" onpointerup="stop()">←</div>
        <div class="joy-btn" onpointerdown="move('down')" onpointerup="stop()">↓</div>
        <div class="joy-btn" onpointerdown="move('right')" onpointerup="stop()">→</div>
    </div>

<script>
    let stats = { hp: 100, weight: 20, intel: 0 };
    let moveDir = null;
    let player, scene;

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade' },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    function preload() {
        // Load các tài nguyên mày đã up lên GitHub
        this.load.image('bg', 'background.png');
        this.load.image('player', 'player.png');
        this.load.image('apple', 'apple.png');
        this.load.image('junk', 'junk.png');
        this.load.image('book', 'book.png');
    }

    function create() {
        scene = this;

        // 1. Thêm nền Sân Trường
        let bg = this.add.image(window.innerWidth/2, window.innerHeight/2, 'bg');
        let scaleX = window.innerWidth / bg.width;
        let scaleY = window.innerHeight / bg.height;
        let scale = Math.max(scaleX, scaleY);
        bg.setScale(scale).setScrollFactor(0);

        // 2. Nhân vật chính (CHỈNH NHỎ LẠI Ở ĐÂY)
        player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'player');
        // Tao giảm từ 0.5 xuống 0.2, nếu vẫn to mày sửa thành 0.1 nhé
        player.setCollideWorldBounds(true).setScale(0.2).setDepth(5);

        // 3. Các vật phẩm
        const foods = this.physics.add.group();
        const dangers = this.physics.add.group();
        const lessons = this.physics.add.group();

        // Hàm tạo vật phẩm với tỉ lệ riêng từng loại
        const spawn = (group, key) => {
            let item = this.physics.add.sprite(
                Phaser.Math.Between(100, window.innerWidth-100), 
                Phaser.Math.Between(150, window.innerHeight-100), 
                key
            );
            
            // CHỈNH KÍCH THƯỚC RIÊNG TỪNG MÓN Ở ĐÂY
            if (key === 'apple') item.setScale(0.15); // Quả táo nhỏ lại cho xinh
            if (key === 'junk') item.setScale(0.25);  // Đùi gà vừa phải
            if (key === 'book') item.setScale(0.15);  // Quyển sách
            
            item.setDepth(4);
            group.add(item);
        };

        for(let i=0; i<3; i++) spawn(foods, 'apple');
        for(let i=0; i<2; i++) spawn(dangers, 'junk');
        spawn(lessons, 'book');

        // ... các phần overlap giữ nguyên ...
        this.physics.add.overlap(player, foods, (p, f) => { f.destroy(); stats.hp = Math.min(100, stats.hp+5); updateUI(); spawn(foods, 'apple'); });
        this.physics.add.overlap(player, dangers, (p, d) => { d.destroy(); stats.hp -= 20; this.cameras.main.shake(150, 0.01); updateUI(); spawn(dangers, 'junk'); });
        this.physics.add.overlap(player, lessons, (p, l) => { l.destroy(); this.scene.pause(); showQuiz(); });

        this.cursors = this.input.keyboard.createCursorKeys();
    }

    function update() {
        if (!player.body) return;
        player.body.setVelocity(0);

        if (this.cursors.left.isDown || moveDir === 'left') { player.setVelocityX(-250); player.setFlipX(true); }
        else if (this.cursors.right.isDown || moveDir === 'right') { player.setVelocityX(250); player.setFlipX(false); }
        
        if (this.cursors.up.isDown || moveDir === 'up') player.setVelocityY(-250);
        else if (this.cursors.down.isDown || moveDir === 'down') player.setVelocityY(250);
    }

    window.move = (dir) => moveDir = dir;
    window.stop = () => moveDir = null;

    function updateUI() {
        document.getElementById('hp').innerText = stats.hp;
        document.getElementById('weight').innerText = stats.weight;
        document.getElementById('intel').innerText = stats.intel;
    }

    const questions = [
        { q: "Có khói bốc lên trong bếp, con làm gì?", a: "Bịt mũi, bò thấp xuống đất", b: "Chạy vào tủ quần áo trốn", c: "A" },
        { q: "Người lạ bảo bố mẹ gặp nạn, đòi đón con?", a: "Đi theo luôn", b: "Vào trường tìm cô giáo", c: "B" }
    ];

    function showQuiz() {
        window.currentQ = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-desc').innerText = window.currentQ.q;
        document.getElementById('btnA').innerText = window.currentQ.a;
        document.getElementById('btnB').innerText = window.currentQ.b;
        document.getElementById('quiz-box').style.display = 'block';
    }

    window.handleAns = function(ans) {
        document.getElementById('quiz-box').style.display = 'none';
        if (ans === window.currentQ.c) { alert("🌟 XUẤT SẮC! +20 Trí tuệ"); stats.intel += 20; }
        else { alert("❌ NGUY HIỂM! Bé mất 20 máu"); stats.hp -= 20; }
        updateUI();
        scene.scene.resume();
        if (stats.hp <= 0) { alert("Bé kiệt sức rồi!"); location.reload(); }
    };
</script>
</body>
</html>
